<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <script>
      // Store the original path and query for SPA routing
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search;
      // Redirect to the base path
      l.replace(l.origin + '/ITZFIZZ/');
    </script>
  </head>
  <body></body>
</html>
